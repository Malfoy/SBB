[package]
name = "bloomybloom"
version = "0.1.0"
edition = "2024"

[dependencies]
ahash = "0.8.12"
async-stream = "0.3.6"
bit-vec = "0.8.0"
bitvec = "1.0.1"
clap = "4.5.53"
csv = "1.4.0"
futures-core = "0.3.31"
futures-util = "0.3.31"
itertools = "0.14.0"
libc = "0.2.177"
needletail = "0.6.3"
nthash = "0.5.1"
packed-seq = "4.2.0"
rand = "0.9.2"
rayon = "1.11.0"
seq-hash = "0.1.1"
simd-minimizers = "2.2.0"
tokio = {version="0.2", features=["rt-threaded", "macros"]}

[profile.dev]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
debug = false
debug-assertions = false
overflow-checks = false
incremental = false

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
panic = "abort"
strip = true
